[toolchain]
anchor_version = "0.29.0"
solana_version = "1.18.0"

[features]
seeds = true
skip-lint = false

[programs.localnet]
lex_atc_settlement = "1exAtcSett1ementProgram11111111111111111111"

[programs.devnet]
lex_atc_settlement = "1exAtcSett1ementProgram11111111111111111111"

