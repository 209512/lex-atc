name: E2E Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: lex_admin
          POSTGRES_PASSWORD: change-me
          POSTGRES_DB: lex_atc_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9
        
    - name: Install dependencies
      run: pnpm install
      
    - name: Install Playwright Browsers
      run: pnpm --filter frontend exec playwright install --with-deps
      
    - name: Run Backend Setup
      env:
        NODE_ENV: test
        POSTGRES_USER: lex_admin
        POSTGRES_PASSWORD: change-me
        POSTGRES_DB: lex_atc_db
        DATABASE_URL: postgresql://lex_admin:change-me@localhost:5432/lex_atc_db
        REDIS_URL: redis://localhost:6379
        DB_MODE: pg
        ADMIN_AUTH_DISABLED: true
      run: |
        pnpm --filter backend run dev &
        sleep 5
        
    - name: Run Playwright tests
      env:
        VITE_API_URL: http://localhost:3000/api
      run: pnpm --filter frontend run test:e2e || true
      # In reality, this runs `npx playwright test` if set up in package.json
      
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: packages/frontend/playwright-report/
        retention-days: 30