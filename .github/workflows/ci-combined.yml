name: CI Combined

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**/*.md'
      - '**/*.mdx'
      - 'docs/**'
      - 'assets/**'
      - 'packages/**/assets/**'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**/*.md'
      - '**/*.mdx'
      - 'docs/**'
      - 'assets/**'
      - 'packages/**/assets/**'
  workflow_dispatch:

concurrency:
  group: ci-combined-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      shared: ${{ steps.filter.outputs.shared }}
      contracts: ${{ steps.filter.outputs.contracts }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Paths Filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'packages/frontend/**'
            backend:
              - 'packages/backend/**'
            shared:
              - 'packages/shared/**'
            contracts:
              - 'packages/contracts/**'
            workflows:
              - '.github/workflows/**'

  node-tests:
    name: Node.js Tests
    runs-on: ubuntu-latest
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.workflows == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.backend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: pnpm -w verify

  frontend-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-22.04
    container: mcr.microsoft.com/playwright:v1.40.0-jammy
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.workflows == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      needs.changes.outputs.frontend == 'true'
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build Shared
        run: pnpm --filter @lex-atc/shared build

      - name: Run Playwright
        run: pnpm --filter frontend exec playwright test --project=chromium

  anchor-tests:
    name: Anchor Contract Tests
    runs-on: ubuntu-latest
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.workflows == 'true' ||
      needs.changes.outputs.contracts == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Install Solana CLI
        run: |
          wget https://github.com/solana-labs/solana/releases/download/v1.18.18/solana-release-x86_64-unknown-linux-gnu.tar.bz2
          tar jxf solana-release-x86_64-unknown-linux-gnu.tar.bz2
          echo "$GITHUB_WORKSPACE/solana-release/bin" >> $GITHUB_PATH

      - name: Generate Local Keypair
        run: |
          export PATH="$GITHUB_WORKSPACE/solana-release/bin:$PATH"
          mkdir -p ~/.config/solana
          solana-keygen new --no-bip39-passphrase -o ~/.config/solana/id.json

      - name: Install Anchor CLI
        run: npm install -g @coral-xyz/anchor-cli@0.29.0

      - name: Install Dependencies
        run: cd packages/contracts && pnpm install --frozen-lockfile

      - name: Run Anchor Tests
        run: |
          export PATH="$GITHUB_WORKSPACE/solana-release/bin:$PATH"
          cd packages/contracts && anchor test
